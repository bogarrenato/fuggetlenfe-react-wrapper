name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install || {
            bootstrap_dir="$(mktemp -d)"
            git clone --depth 1 https://github.com/bogarrenato/fuggetlenfe-tokens.git "$bootstrap_dir/tokens"
            git clone --depth 1 https://github.com/bogarrenato/fuggetlenfe-components.git "$bootstrap_dir/components"

            (
              cd "$bootstrap_dir/tokens"
              npm install
            )

            (
              cd "$bootstrap_dir/components"
              npm pkg set devDependencies.@fuggetlenfe/tokens="file:$bootstrap_dir/tokens"
              npm install
              npm run build
            )

            components_tarball="$(cd "$bootstrap_dir/components" && npm pack | tail -n 1)"
            npm pkg set dependencies.@fuggetlenfe/components="file:$bootstrap_dir/components/$components_tarball"
            npm install
          }

      - name: Build wrapper
        run: npm run build

      - name: Build docs site
        run: npm run build:docs-site

      - name: Validate publish artifact
        run: npm run pack:check
